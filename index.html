  <table>${(plans||[]).map(p=>`<tr><td>${p.name}</td><td>₹${p.price}</td><td>${p.duration_days} days</td><td><button class="danger delBtn" data-id="${p.id}" style="padding:5px 9px;font-size:11px;">Delete</button></td></tr>`).join('')}</table>
  <div class="divider"></div>
  <label>Plan name</label><input id="pName" placeholder="e.g. Monthly">
  <label>Price (₹)</label><input id="pPrice" type="number">
  <label>Duration (days)</label><input id="pDays" type="number">
  <button class="primary" id="pAdd" style="margin-top:12px;">Add plan</button>
  </div>`;
  document.getElementById('pAdd').onclick=async ()=>{
    const name=document.getElementById('pName').value.trim();
    const price=+document.getElementById('pPrice').value;
    const days=+document.getElementById('pDays').value;
    if(!name||!price||!days){ toast('Fill all plan fields'); return; }
    await sb.from('plans').insert({name, price, duration_days:days});
    adminPlans();
  };
  body.querySelectorAll('.delBtn').forEach(b=>b.onclick=async ()=>{ await sb.from('plans').delete().eq('id', b.dataset.id); adminPlans(); });
}

// ================= ADMIN RANKINGS =================
const EXAMTYPE_RANK_LABELS = {
  auto_subsection: 'Grand Tests (GT)',
  inicet: 'INICET',
  neetpg: 'NEET PG',
  updated_neetpg: 'Updated NEET PG',
};
async function adminRankings(){
  const body=document.getElementById('atabBody');
  const { data: qbanks } = await sb.from('qbanks').select('*').order('created_at',{ascending:false});
  S.rankQb = S.rankQb || (qbanks && qbanks[0] && qbanks[0].id);
  body.innerHTML = `
  <div class="card">
    <h3>Per set / per subject / per section</h3>
    <label>QBank</label>
    <select id="rkQb">${(qbanks||[]).map(qb=>`<option value="${qb.id}" ${qb.id===S.rankQb?'selected':''}>${qb.name}</option>`).join('')}</select>
    <div id="rkFolderWrap" style="margin-top:10px;"></div>
    <div id="rkSetsWrap" style="margin-top:10px;"></div>
  </div>
  <div class="card">
    <h3>Exam-pattern totals (across every qbank)</h3>
    <div class="row" id="rkExamBtns">
      ${Object.entries(EXAMTYPE_RANK_LABELS).map(([k,label])=>`<button class="scopebtn" data-examtype="${k}">${label} total</button>`).join('')}
    </div>
  </div>
  <div class="card">
    <h3>Overall app total</h3>
    <p class="muted">Every submitted attempt across every qbank, section and subject, added up per user.</p>
    <button class="primary" id="rkOverallBtn">Load overall rank list</button>
  </div>
  <div id="rankResult"></div>`;
  document.getElementById('rkQb').onchange = (e)=>{ S.rankQb = e.target.value; renderRankFolders(); };
  document.querySelectorAll('[data-examtype]').forEach(b=>b.onclick=()=>{
    loadRankList('examtype', { p_exam_type: b.dataset.examtype }, `${EXAMTYPE_RANK_LABELS[b.dataset.examtype]} — overall total`);
  });
  document.getElementById('rkOverallBtn').onclick = ()=>{
    loadRankList('overall', {}, 'Overall app total');
  };
  await renderRankFolders();
}
async function renderRankFolders(){
  const wrap = document.getElementById('rkFolderWrap');
  const { data: folders } = await sb.from('folders').select('*').eq('qbank_id', S.rankQb).order('name');
  if(!folders || !folders.length){ wrap.innerHTML = `<p class="muted">No sections in this qbank yet.</p>`; document.getElementById('rkSetsWrap').innerHTML=''; return; }
  S.rankFolder = S.rankFolder && folders.some(f=>f.id===S.rankFolder) ? S.rankFolder : folders[0].id;
  wrap.innerHTML = `<label>Section</label><select id="rkFolder">${folders.map(f=>`<option value="${f.id}" ${f.id===S.rankFolder?'selected':''}>${f.name}</option>`).join('')}</select>`;
  document.getElementById('rkFolder').onchange = (e)=>{ S.rankFolder = e.target.value; renderRankSets(); };
  await renderRankSets();
}
async function renderRankSets(){
  const wrap = document.getElementById('rkSetsWrap');
  const { data: folder } = await sb.from('folders').select('*').eq('id', S.rankFolder).maybeSingle();
  const { data: sets } = await sb.from('sets').select('*').eq('folder_id', S.rankFolder).is('user_id', null).order('subject').order('set_number');
  if(!folder || !sets || !sets.length){ wrap.innerHTML = `<p class="muted">No sets generated for this section yet.</p>`; return; }
  let html = '';
  if(folder.exam_type==='subjectwise'){
    const bySubject={};
    sets.forEach(s=>{ (bySubject[s.subject||'General']=bySubject[s.subject||'General']||[]).push(s); });
    for(const subj in bySubject){
      html += `<div style="margin:12px 0 6px;"><b>${subj}</b> <button class="scopebtn" data-subjtotal="${subj}" style="margin-left:8px;">Subject total</button></div>`;
      bySubject[subj].forEach(s=>{ html += `<button class="scopebtn" data-setid="${s.id}" style="margin:3px 6px 3px 0;">Set ${s.set_number}</button>`; });
    }
  } else {
    html += `<div style="margin:12px 0 6px;"><button class="scopebtn" data-foldertotal="${folder.id}">Section total (all subsections)</button></div>`;
    sets.forEach(s=>{ html += `<button class="scopebtn" data-setid="${s.id}" style="margin:3px 6px 3px 0;">Set ${s.set_number}</button>`; });
  }
  wrap.innerHTML = html;
  wrap.querySelectorAll('[data-setid]').forEach(b=>b.onclick=()=>{
    const s = sets.find(x=>x.id===b.dataset.setid);
    loadRankList('set', { p_set_id: b.dataset.setid }, `${folder.name}${s?.subject?' — '+s.subject:''} — Set ${s?.set_number||''}`);
  });
  wrap.querySelectorAll('[data-subjtotal]').forEach(b=>b.onclick=()=>{
    loadRankList('subject', { p_folder_id: folder.id, p_subject: b.dataset.subjtotal }, `${folder.name} — ${b.dataset.subjtotal} — subject total`);
  });
  const ft = wrap.querySelector('[data-foldertotal]');
  if(ft) ft.onclick = ()=> loadRankList('folder', { p_folder_id: folder.id }, `${folder.name} — section total`);
}
async function loadRankList(scope, params, title){
  const result = document.getElementById('rankResult');
  result.innerHTML = `<div class="card muted">Loading…</div>`;
  const rpcName = {
    set:'admin_set_rank_list', subject:'admin_subject_rank_list',
    folder:'admin_folder_rank_list', examtype:'admin_examtype_rank_list', overall:'admin_overall_rank_list'
  }[scope];
  const { data, error } = await sb.rpc(rpcName, params);
  if(error){
    result.innerHTML = `<div class="card"><h3>${title}</h3><p class="muted" style="color:var(--red);">Couldn't load this rank list — ${error.message}. Make sure the ranking SQL functions have been added in Supabase.</p></div>`;
    return;
  }
  renderRankTable(data||[], title);
}
function renderRankTable(rows, title){
  const result = document.getElementById('rankResult');
  if(!rows.length){
    result.innerHTML = `<div class="card"><h3>${title}</h3><p class="muted">No submitted attempts here yet.</p></div>`;
    return;
  }
  const rowsHtml = rows.map(r=>{
    const pct = r.total_questions ? Math.round((r.correct_count/r.total_questions)*1000)/10 : 0;
    return `<tr><td>${r.rnk ?? ''}</td><td>${escapeHtml(r.name||'—')}</td><td>${escapeHtml(r.batch||'—')}</td><td>${escapeHtml(r.college||'—')}</td><td>${escapeHtml(r.email||'')}</td><td>${r.correct_count}/${r.total_questions}</td><td>${pct}%</td><td>${r.score>0?'+':''}${r.score}</td></tr>`;
  }).join('');
  result.innerHTML = `<div class="card">
    <div class="row" style="justify-content:space-between;">
      <h3>${title}</h3>
      <button class="subtle" id="rkDownloadPdf">⬇️ Download PDF</button>
    </div>
    <div style="overflow-x:auto;"><table class="ranktbl"><tr><th>Rank</th><th>Name</th><th>Batch</th><th>College</th><th>Email</th><th>Correct</th><th>%</th><th>Score</th></tr>${rowsHtml}</table></div>
  </div>
  <div id="printArea" style="display:none;">
    <h2 style="font-family:Arial;">${title}</h2>
    <table style="width:100%;border-collapse:collapse;font-family:Arial;font-size:12px;">
      <tr style="background:#eee;"><th style="border:1px solid #999;padding:6px;">Rank</th><th style="border:1px solid #999;padding:6px;">Name</th><th style="border:1px solid #999;padding:6px;">Batch</th><th style="border:1px solid #999;padding:6px;">College</th><th style="border:1px solid #999;padding:6px;">Email</th><th style="border:1px solid #999;padding:6px;">Correct</th><th style="border:1px solid #999;padding:6px;">%</th><th style="border:1px solid #999;padding:6px;">Score</th></tr>
      ${rows.map(r=>{
        const pct = r.total_questions ? Math.round((r.correct_count/r.total_questions)*1000)/10 : 0;
        return `<tr><td style="border:1px solid #999;padding:6px;">${r.rnk ?? ''}</td><td style="border:1px solid #999;padding:6px;">${escapeHtml(r.name||'—')}</td><td style="border:1px solid #999;padding:6px;">${escapeHtml(r.batch||'—')}</td><td style="border:1px solid #999;padding:6px;">${escapeHtml(r.college||'—')}</td><td style="border:1px solid #999;padding:6px;">${escapeHtml(r.email||'')}</td><td style="border:1px solid #999;padding:6px;">${r.correct_count}/${r.total_questions}</td><td style="border:1px solid #999;padding:6px;">${pct}%</td><td style="border:1px solid #999;padding:6px;">${r.score>0?'+':''}${r.score}</td></tr>`;
      }).join('')}
    </table>
  </div>`;
  document.getElementById('rkDownloadPdf').onclick = ()=>{
    // Prints just #printArea (see the @media print rule) — the browser's
    // print dialog has a "Save as PDF" destination on every platform, so
    // this hands the admin a real downloadable PDF without any extra library.
    window.print();
  };
}

boot();
if('serviceWorker' in navigator){ window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
