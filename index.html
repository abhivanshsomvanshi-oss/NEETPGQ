<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>QBank Console</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1220">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#070B14; --surface:#111726; --surface-2:#182034; --surface-3:#1F2A42; --border:#28324E;
  --border-soft:rgba(255,255,255,.055);
  --paper:#EFEEE7; --paper-2:#E4E2D8;
  --text:#EEF1FA; --text-dim:#8D97B4; --text-inv:#141B2E;
  --amber:#EFA53E; --amber-2:#FFCE7A; --amber-dim:#3A2C13;
  --cyan:#57CFE0; --cyan-dim:#122E33;
  --gray:#8A93A6; --red:#F0525A; --green:#30B87A; --purple:#9B7CF6;
  --radius:16px; --radius-lg:22px;
  --display:'Space Grotesk',sans-serif; --body:'Inter',sans-serif; --mono:'IBM Plex Mono',monospace;
  --shadow:0 10px 34px -10px rgba(0,0,0,.55), 0 2px 10px rgba(0,0,0,.35);
  --shadow-sm:0 3px 12px rgba(0,0,0,.3);
  --glow-amber:0 0 0 1px rgba(239,165,62,.28), 0 0 22px -4px rgba(239,165,62,.45);
  --ease:cubic-bezier(.2,.8,.2,1);
  --bg-image:
    radial-gradient(circle at 14% -4%, rgba(239,165,62,.10) 0%, transparent 40%),
    radial-gradient(circle at 100% 6%, rgba(87,207,224,.08) 0%, transparent 38%),
    radial-gradient(circle at 50% 120%, rgba(155,124,246,.06) 0%, transparent 45%),
    var(--bg);
}
html.light{
  --bg:#F5F2E9; --surface:#FFFFFF; --surface-2:#F1EEE2; --surface-3:#E8E3D2; --border:#E1DBC8;
  --border-soft:rgba(20,15,5,.06);
  --text:#221D13; --text-dim:#6B6455; --text-inv:#FFFFFF;
  --amber:#B9791F; --amber-2:#8F5D12; --amber-dim:#F3E3C4;
  --cyan:#1591A3; --cyan-dim:#DEF3F5;
  --gray:#B7AF9D; --shadow:0 10px 28px -8px rgba(80,60,20,.14), 0 2px 8px rgba(80,60,20,.08);
  --shadow-sm:0 3px 10px rgba(80,60,20,.08);
  --glow-amber:0 0 0 1px rgba(185,121,31,.25), 0 0 18px -5px rgba(185,121,31,.35);
  --bg-image:radial-gradient(circle at 10% -4%, #FBF3DC 0%, transparent 42%),radial-gradient(circle at 100% 4%, #E8F4F2 0%, transparent 40%),var(--bg);
}
*{box-sizing:border-box;}
@media(prefers-reduced-motion: reduce){ *{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; scroll-behavior:auto !important;} }
html,body{margin:0;padding:0;background:var(--bg-image);background-attachment:fixed;color:var(--text);font-family:var(--body);height:100%;font-size:16.5px;-webkit-font-smoothing:antialiased;}
body{position:relative;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background-image:repeating-linear-gradient(180deg, rgba(255,255,255,.012) 0px, rgba(255,255,255,.012) 1px, transparent 1px, transparent 3px);}
html.light body::before{opacity:.35; background-image:repeating-linear-gradient(180deg, rgba(20,15,5,.01) 0px, rgba(20,15,5,.01) 1px, transparent 1px, transparent 3px);}
#app{min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;}
::selection{background:var(--amber);color:#241a06;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--amber-dim);}
a{color:var(--amber);}
h1,h2,h3{font-family:var(--display);margin:0 0 8px;letter-spacing:.01em;}
h2{font-size:22px;} h3{font-size:18px;}
:focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:6px;}
button{font-family:var(--body);cursor:pointer;border:none;border-radius:12px;padding:13px 20px;font-weight:600;font-size:15.5px;transition:transform .16s var(--ease), opacity .15s, box-shadow .2s, background .2s, border-color .2s;min-height:46px;position:relative;}
button:active{transform:scale(.96);}
button.primary{background:linear-gradient(135deg,var(--amber),var(--amber-2));color:#241a06;box-shadow:0 3px 14px rgba(239,165,62,.32);}
button.primary:hover{box-shadow:0 6px 20px rgba(239,165,62,.48);transform:translateY(-1px);}
button.primary:active{transform:translateY(0) scale(.96);}
button.ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
button.ghost:hover{border-color:var(--amber);color:var(--amber);}
button.danger{background:linear-gradient(135deg,var(--red),#c93840);color:#fff;box-shadow:0 3px 12px rgba(229,72,77,.28);}
button.danger:hover{box-shadow:0 6px 18px rgba(229,72,77,.4);transform:translateY(-1px);}
button.subtle{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
button.subtle:hover{background:var(--surface-3);}
button:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none;}
button.iconbtn{padding:8px 12px;font-size:16px;min-height:auto;border-radius:10px;}
input,select,textarea{font-family:var(--body);background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:13px 14px;border-radius:10px;font-size:16px;width:100%;min-height:46px;transition:border-color .15s, box-shadow .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(239,165,62,.15);}
label{font-size:12.5px;color:var(--text-dim);display:block;margin:11px 0 5px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:color-mix(in srgb, var(--surface) 88%, transparent);backdrop-filter:blur(10px);z-index:50;box-shadow:var(--shadow-sm);}
.brand{font-family:var(--display);font-weight:700;font-size:20.5px;letter-spacing:.01em;display:flex;align-items:center;gap:9px;}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--amber);box-shadow:0 0 10px var(--amber), 0 0 2px var(--amber);position:relative;animation:dotPulse 2.4s ease-in-out infinite;}
@keyframes dotPulse{0%,100%{box-shadow:0 0 8px var(--amber), 0 0 2px var(--amber);}50%{box-shadow:0 0 16px var(--amber), 0 0 4px var(--amber);}}
.container{max-width:960px;margin:0 auto;padding:24px 18px 90px;width:100%;flex:1;}
@keyframes riseIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card{background:linear-gradient(180deg, color-mix(in srgb, var(--surface) 100%, white 2%), var(--surface));border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:16px;box-shadow:var(--shadow);animation:riseIn .38s var(--ease) both;transition:border-color .2s, box-shadow .2s;}
.badge{display:inline-block;padding:4px 11px;border-radius:100px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.badge.active{background:#123822;color:var(--green);box-shadow:inset 0 0 0 1px rgba(48,184,122,.35);}
.badge.pending{background:#392b10;color:var(--amber);box-shadow:inset 0 0 0 1px rgba(239,165,62,.35);}
.badge.revoked{background:#3d1519;color:var(--red);box-shadow:inset 0 0 0 1px rgba(240,82,90,.35);}
.badge.unset{background:#332711;color:var(--text-dim);box-shadow:inset 0 0 0 1px var(--border);}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.muted{color:var(--text-dim);font-size:14px;}
.tabs{display:flex;gap:6px;border-bottom:1px solid var(--border-soft);margin-bottom:18px;overflow-x:auto;}
.tab{padding:13px 16px;font-size:15px;font-weight:600;color:var(--text-dim);border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;min-height:46px;display:flex;align-items:center;transition:color .18s, border-color .18s;}
.tab:hover{color:var(--text);}
.tab.on{color:var(--amber);border-color:var(--amber);}
.crumbs{font-size:13px;color:var(--text-dim);margin-bottom:12px;}
.crumbs span{cursor:pointer;color:var(--amber);}
.crumbs span:hover{text-decoration:underline;}
.qrow{display:flex;justify-content:space-between;align-items:center;padding:16px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;cursor:pointer;transition:background .18s, transform .16s var(--ease), border-color .18s, box-shadow .18s;animation:riseIn .34s var(--ease) both;}
.qrow:hover{background:var(--amber-dim);border-color:var(--amber);transform:translateX(3px);box-shadow:var(--shadow-sm);}
.lockicon{opacity:.6;font-size:15px;}
.exam-shell{display:grid;grid-template-columns:1fr 260px;gap:0;flex:1;}
@media(max-width:760px){.exam-shell{grid-template-columns:1fr;}}
.exam-main{padding:20px;overflow-y:auto;}
.exam-side{background:var(--surface);border-left:1px solid var(--border-soft);padding:16px;}
.timer-ring{display:inline-flex;padding:3px;border-radius:14px;background:conic-gradient(var(--amber) calc(var(--pct,100)*1%), var(--border) 0);transition:background .5s linear;}
.timer-ring.low{background:conic-gradient(var(--red) calc(var(--pct,100)*1%), var(--border) 0);animation:timerLowPulse 1s ease-in-out infinite;}
@keyframes timerLowPulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.35);}}
.timer{font-family:var(--mono);font-size:27px;font-weight:600;color:var(--amber);letter-spacing:.03em;background:var(--amber-dim);padding:8px 14px;border-radius:11px;display:inline-block;}
.timer-ring.low .timer{color:var(--red);}
.opt{display:flex;gap:10px;align-items:flex-start;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;font-size:18px;line-height:1.5;transition:border-color .18s, background .18s, transform .16s var(--ease);animation:riseIn .3s var(--ease) both;}
.opt:nth-of-type(1){animation-delay:0ms;} .opt:nth-of-type(2){animation-delay:40ms;} .opt:nth-of-type(3){animation-delay:80ms;} .opt:nth-of-type(4){animation-delay:120ms;} .opt:nth-of-type(5){animation-delay:160ms;}
.opt:hover{border-color:var(--amber);transform:translateX(2px);}
.opt.sel{border-color:var(--amber);background:var(--amber-dim);box-shadow:var(--glow-amber);}
.opt.correct{border-color:var(--green);background:#0f2a1c;box-shadow:0 0 0 1px rgba(48,184,122,.3), 0 0 18px -6px rgba(48,184,122,.5);}
.opt.wrong{border-color:var(--red);background:#2a1113;box-shadow:0 0 0 1px rgba(240,82,90,.3), 0 0 18px -6px rgba(240,82,90,.5);}
.palette{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:12px;}
.pnum{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;border:2px solid transparent;color:#0B1220;min-height:28px;max-width:34px;transition:transform .15s var(--ease), filter .15s;}
.pnum:hover{transform:scale(1.1);filter:brightness(1.1);}
.pnum.not_visited{background:var(--gray);}
.pnum.not_answered{background:var(--red);color:#fff;}
.pnum.answered{background:var(--green);color:#fff;}
.pnum.marked{background:var(--purple);color:#fff;}
.pnum.answered_marked{background:var(--purple);color:#fff;box-shadow:inset 0 0 0 3px var(--green);}
.pnum.current{border-color:var(--amber);box-shadow:0 0 0 3px rgba(239,165,62,.25);}
.legend{display:flex;flex-direction:column;gap:5px;font-size:11px;margin-top:14px;color:var(--text-dim);}
.legend span{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle;}
.reviewcard{background:var(--surface);color:var(--text);border-radius:var(--radius);padding:18px;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow);animation:riseIn .34s var(--ease) both;}
.reviewcard .opt{background:var(--surface-2);color:var(--text);border-color:var(--border);}
.reviewcard .opt.correct{background:#0f2a1c;border-color:var(--green);}
.reviewcard .opt.wrong{background:#2a1113;border-color:var(--red);}
.catbtns{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.catbtns button{font-size:12px;padding:7px 10px;}
.overlay{position:fixed;inset:0;background:rgba(7,11,20,.82);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;animation:fadeIn .2s ease both;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;max-width:440px;width:100%;max-height:86vh;overflow-y:auto;box-shadow:0 20px 60px -12px rgba(0,0,0,.6);animation:riseIn .3s var(--ease) both;}
.locked-banner{background:linear-gradient(120deg,var(--amber-dim),color-mix(in srgb, var(--amber-dim) 60%, transparent));border:1px solid var(--amber-dim);border-radius:var(--radius);padding:18px;margin-bottom:16px;}
table.rt{width:100%;border-collapse:collapse;font-size:14px;margin:10px 0;}
table.rt th,table.rt td{text-align:left;padding:9px 7px;border:1px solid var(--border);}
table.rt th{color:var(--text-dim);font-weight:600;font-size:12px;text-transform:uppercase;}
.reviewcard table.rt th,.reviewcard table.rt td{border-color:var(--border);}
table{width:100%;border-collapse:collapse;font-size:14px;}
th,td{text-align:left;padding:9px 7px;border-bottom:1px solid var(--border);}
th{color:var(--text-dim);font-weight:600;font-size:12px;text-transform:uppercase;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--border);padding:11px 19px;border-radius:100px;font-size:14px;z-index:300;box-shadow:var(--shadow);animation:toastIn .25s var(--ease) both;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}
.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--amber);border-right-color:var(--amber-2);border-radius:50%;animation:spin .7s linear infinite;margin:30px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.qmeta{font-family:var(--mono);font-size:13px;color:var(--text-dim);margin-bottom:6px;}
.stat-big{font-family:var(--mono);font-size:32px;font-weight:600;background:linear-gradient(135deg,var(--amber),var(--amber-2));-webkit-background-clip:text;background-clip:text;color:transparent;}
.divider{height:1px;background:linear-gradient(90deg, transparent, var(--border), transparent);margin:16px 0;}
.qimg{max-width:100%;border-radius:10px;margin:10px 0;display:block;background:var(--surface-2);min-height:60px;box-shadow:var(--shadow-sm);}
.filepick{border:1px dashed var(--border);border-radius:10px;padding:14px;margin-top:6px;transition:border-color .18s;}
.filepick:hover{border-color:var(--amber);}
.themebtn{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px 12px;font-size:17px;min-height:auto;line-height:1;transition:transform .2s var(--ease), border-color .2s;}
.themebtn:hover{transform:rotate(20deg);border-color:var(--amber);}
.ranktbl{width:100%;border-collapse:collapse;font-size:14px;margin-top:10px;}
.ranktbl th,.ranktbl td{padding:9px 8px;border-bottom:1px solid var(--border);text-align:left;}
.ranktbl th{color:var(--text-dim);font-size:11.5px;text-transform:uppercase;}
.ranktbl tr{transition:background .15s;}
.ranktbl tr:hover{background:var(--surface-2);}
.ranktbl tr.me{background:var(--amber-dim);}
.scopebtn{background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:13.5px;font-weight:600;min-height:auto;transition:background .18s, border-color .18s;}
.scopebtn.on{background:linear-gradient(135deg,var(--amber),var(--amber-2));color:#241a06;border-color:var(--amber);}
@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{position:absolute;left:0;top:0;width:100%;}
}
</style>

<div id="app"><div class="spinner"></div></div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://vjqhgxjnzjxqvralcvqq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqcWhneGpuemp4cXZyYWxjdnFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NjQ1NjQsImV4cCI6MjA5OTM0MDU2NH0.KnYldvE-fH9Rbc5Px3tZ6BjQLhcMDI-Vmg6QX9XPILk';

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const app = document.getElementById('app');

const CATS = [
  {key:'guess_work', label:'Guess work'},
  {key:'fact_unknown', label:'Fact unknown'},
  {key:'concept_unknown', label:'Concept unknown'},
  {key:'silly_mistake', label:'Silly mistake'},
];
const EXAM_CONFIG = {
  subjectwise:  {label:'Subject-wise', perSet:50, minutesPerFull:45, sequential:false},
  inicet:       {label:'INICET pattern',        perSet:50, minutesPerFull:45, sequential:true},
  neetpg:       {label:'NEET PG pattern',       perSet:40, minutesPerFull:42, sequential:true},
  updated_neetpg:{label:'Updated NEET PG pattern', perSet:36, minutesPerFull:42, sequential:true},
  auto_subsection:{label:'Auto (non-subject file) — 50 q / 45 min subsections', perSet:50, minutesPerFull:45, sequential:true},
};

// The 19 NEET PG subjects, each with common short/long-form aliases used by
// providers like BTR/Prepladder. A file/folder name is matched against these
// (whole-word, case-insensitive) to auto-detect that it's a subject file.
const SUBJECT_ALIASES = {
  'Anatomy':                    ['anatomy','anat'],
  'Physiology':                 ['physiology','physio','phys'],
  'Biochemistry':                ['biochemistry','biochem','bioc'],
  'Pathology':                   ['pathology','patho','path'],
  'Pharmacology':                ['pharmacology','pharma','pharm'],
  'Microbiology':                ['microbiology','micro'],
  'Forensic Medicine':           ['forensicmedicine','forensic','fmt'],
  'Community Medicine (PSM)':    ['communitymedicine','psm','sm','pmr'],
  'ENT':                         ['ent','otorhinolaryngology'],
  'Ophthalmology':               ['ophthalmology','ophthal','opth','eye'],
  'Medicine':                    ['medicine','generalmedicine','gm','im'],
  'Surgery':                     ['surgery','generalsurgery','gs'],
  'Pediatrics':                  ['pediatrics','paediatrics','peds','pedia'],
  'Obstetrics & Gynaecology':    ['obg','obstetrics','gynaecology','gynecology','gynae','og'],
  'Orthopedics':                 ['orthopedics','orthopaedics','ortho'],
  'Radiology':                   ['radiology','radiodiagnosis','radio'],
  'Anesthesia':                  ['anesthesia','anaesthesia','anaesthesiology','anesthesiology'],
  'Psychiatry':                  ['psychiatry','psych'],
  'Dermatology':                 ['dermatology','derma','dvl','skin'],
};
function detectSubject(name){
  const tokens = String(name||'').toLowerCase().replace(/\.(json|ndjson|txt)$/,'').split(/[^a-z0-9]+/).filter(Boolean);
  for(const tok of tokens){
    for(const subj in SUBJECT_ALIASES){
      if(SUBJECT_ALIASES[subj].includes(tok)) return subj;
    }
  }
  return null;
}
// Decides the exam pattern for an uploaded file purely from its name:
// - matches one of the 19 subjects (short or full form) -> subject-wise
//   (50 q / 45 min sets, last partial set gets 0.9 min/question)
// - anything else (gt1, gt2, neetpg, inicet, ...) -> auto_subsection
//   (50 q / 45 min sequential subsections inside one section, can't reopen
//   a submitted/expired subsection)
function autoDetectExamType(name){
  const subject = detectSubject(name);
  if(subject) return { type:'subjectwise', subject };
  return { type:'auto_subsection', subject:null };
}
// Detects which "platform" (qbank) a file belongs to from its name, e.g.
// "Prepladder_GT1.json" or "BTR Anatomy.json". Add more aliases here as
// you bring in more source platforms.
const PLATFORM_ALIASES = {
  'BTR': ['btr'],
  'Prepladder': ['prepladder'],
};
function detectPlatformName(name){
  const tokens = String(name||'').toLowerCase().replace(/\.(json|ndjson|txt)$/,'').split(/[^a-z0-9]+/).filter(Boolean);
  for(const tok of tokens){
    for(const platform in PLATFORM_ALIASES){
      if(PLATFORM_ALIASES[platform].includes(tok)) return platform;
    }
  }
  return null;
}

let S = { session:null, profile:null, deviceId:null, view:'loading', nav:{} };

// ---------- theme (dark / light) ----------
function applyTheme(){
  const t = localStorage.getItem('qb_theme') || 'dark';
  document.documentElement.classList.toggle('light', t==='light');
}
function toggleTheme(){
  const cur = localStorage.getItem('qb_theme') || 'dark';
  localStorage.setItem('qb_theme', cur==='dark' ? 'light' : 'dark');
  applyTheme();
  render();
}
applyTheme();

// ---------- in-app back navigation ----------
// The app never changes the URL, so by default the phone's/browser's back
// button (or back gesture) has nothing to "undo" and just closes the app.
// To fix that, every time the user moves to a deeper/different screen we
// push one browser-history entry and remember a snapshot of where they
// were. A hardware/gesture back then fires `popstate`, which we catch here
// to restore that snapshot instead of letting the OS close the app. Only
// once our own stack is empty (i.e. we're back at the very first screen)
// does back behave like normal browser/app-exit back.
let navStack = [];
function snapshotState(){
  return { view:S.view, utab:S.utab, atab:S.atab, nav:{...(S.nav||{})}, exam:S.exam||null, review:S.review||null };
}
// Wrap any navigation that should be "undo-able" with the back button:
// goTo({nav:{...}}) / goTo({utab:'stats'}) / goTo({view:'exam', exam:{...}}) etc.
function goTo(changes){
  navStack.push(snapshotState());
  history.pushState({d:navStack.length}, '');
  Object.assign(S, changes);
  render();
}
window.addEventListener('popstate', ()=>{
  // Leaving an in-progress exam via hardware back: stop the timer and flush
  // the latest answers, same as the explicit "← Back" button does.
  if(S.exam){
    clearInterval(timerHandle);
    clearTimeout(saveTimeout);
    sb.from('attempts').update({answers:S.exam.att.answers}).eq('id', S.exam.att.id);
  }
  if(navStack.length){
    const prev = navStack.pop();
    S.view=prev.view; S.utab=prev.utab; S.atab=prev.atab; S.nav=prev.nav||{}; S.exam=prev.exam||null; S.review=prev.review||null;
    render();
  } else if(S.exam || S.view==='exam'){
    // Nothing left on our stack, but we were mid-exam — land safely on the
    // dashboard rather than showing a broken exam screen.
    S.exam=null; S.view='user'; S.utab='qbanks'; S.nav={};
    render();
  }
  // else: our stack is empty and we're already on a top-level screen, so
  // there's nothing to intercept — let the platform's normal back happen.
});

function toast(msg){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2600);
}
function getDeviceId(){
  let id = localStorage.getItem('qb_device_id');
  if(!id){ id = 'dev_'+Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('qb_device_id', id); }
  return id;
}
function fmtTime(sec){
  if(sec<0) sec=0;
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=Math.floor(sec%60);
  return (h>0?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function statusOf(a){ return a ? a.status : 'not_visited'; }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Rich text renderer: supports plain text, **bold**, line breaks, and
// pipe tables (for "match the following" / tabular questions). Input is
// escaped first, so this never introduces unsafe HTML.
// Applies **bold** and inline ![alt](url) image syntax. Image syntax works
// anywhere — question stem, each option, explanation text, and even inside
// "match the following" table cells — so any phase/pattern (subject-wise,
// GT, INICET, NEET PG) can carry an image wherever it's placed, just by
// including ![](https://your-image-url) in that field's text.
function inlineFmt(s){
  return s
    .replace(/!\[([^\]]*)\]\((\S+?)\)/g, '<img class="qimg" src="$2" alt="$1">')
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
}
function renderRichText(raw){
  if(!raw) return '';
  const escaped = escapeHtml(raw);
  const lines = escaped.split(/\n/);
  let html = '', tableBuf = [], inTable = false;
  const flushTable = ()=>{
    if(!tableBuf.length) return;
    const rows = tableBuf.filter(r=>!/^\s*\|?\s*:?-+:?\s*(\|\s*:?-+:?\s*)*\|?\s*$/.test(r));
    html += '<table class="rt">';
    rows.forEach((r,ri)=>{
      const cells = r.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      const tag = ri===0 ? 'th' : 'td';
      html += '<tr>' + cells.map(c=>`<${tag}>${inlineFmt(c)}</${tag}>`).join('') + '</tr>';
    });
    html += '</table>';
    tableBuf = [];
  };
  for(const line of lines){
    if(/^\s*\|.*\|\s*$/.test(line)){
      inTable = true; tableBuf.push(line); continue;
    } else if(inTable){
      flushTable(); inTable = false;
    }
    let l = inlineFmt(line);
    html += (html && !html.endsWith('</table>') ? '<br>' : '') + l;
  }
  if(inTable) flushTable();
  return html;
}
// Resolves a bare filename (e.g. "q1.png") referenced in the JSON against a
// map of {lowercased filename -> uploaded public URL}. Full http(s) URLs are
// left untouched, so existing JSON that already uses hosted image URLs keeps
// working exactly as before.
function resolveImageField(v, imageMap){
  if(!v) return v;
  if(/^https?:\/\//i.test(v)) return v;
  return (imageMap && imageMap[String(v).trim().toLowerCase()]) || v;
}
// Same idea but for inline ![alt](filename) refs inside rich text fields
// (question stem, options, explanation, table cells).
function resolveInlineImages(text, imageMap){
  if(!text) return text;
  return text.replace(/!\[([^\]]*)\]\((\S+?)\)/g, (m, alt, url)=>{
    if(/^https?:\/\//i.test(url)) return m;
    const resolved = imageMap && imageMap[url.trim().toLowerCase()];
    return resolved ? `![${alt}](${resolved})` : m;
  });
}
function richBlock(raw, imageUrl){
  let html = '';
  if(imageUrl) html += `<img class="qimg" src="${escapeHtml(imageUrl)}" alt="question image" loading="eager" fetchpriority="high" decoding="async">`;
  html += `<div>${renderRichText(raw)}</div>`;
  return html;
}

// ---------- boot ----------
async function boot(){
  S.deviceId = getDeviceId();
  const { data:{ session } } = await sb.auth.getSession();
  S.session = session;
  if(session){ await loadProfile(); }
  render();
  sb.auth.onAuthStateChange((event, sess)=>{
    // Any of these events can re-fire for the SAME already-signed-in user
    // whenever the tab regains focus — which happens the instant the native
    // file picker closes after choosing a file. Re-rendering in that case
    // wipes whatever screen (and file selection) was in progress and looks
    // like the page refreshed itself. So we only reload profile + re-render
    // when the signed-in user has actually changed (real sign-in/out),
    // never just because Supabase re-emitted an event for the same user.
    const prevUserId = S.session?.user?.id || null;
    const nextUserId = sess?.user?.id || null;
    S.session = sess;
    if(prevUserId === nextUserId) return; // same user (or same signed-out state) — no-op
    if(sess) loadProfile().then(render); else { S.profile=null; S.view='auth'; render(); }
  });
}
async function loadProfile(){
  const email = S.session.user.email;
  const isAdminEmail = email === ADMIN_EMAIL;
  let { data } = await sb.from('profiles').select('*').eq('id', S.session.user.id).maybeSingle();
  if(!data){
    const ins = await sb.from('profiles').upsert({
      id:S.session.user.id, email,
      role: isAdminEmail?'admin':'user',
      status: isAdminEmail?'active':'pending'
    }, {onConflict:'id'}).select().maybeSingle();
    data = ins.data;
  }
  if(isAdminEmail && data && (data.role!=='admin' || data.status!=='active')){
    const upd = await sb.from('profiles').update({role:'admin', status:'active'}).eq('id', S.session.user.id).select().maybeSingle();
    if(upd.data) data = upd.data;
  }
  S.profile = data;
  if(S.profile && S.profile.role!=='admin'){
    await registerDevice();
  }
  S.view = S.profile?.role==='admin' ? 'admin' : 'user';
}
async function registerDevice(){
  const { data: devices } = await sb.from('devices').select('*').eq('user_id', S.profile.id);
  const mine = (devices||[]).find(d=>d.device_id===S.deviceId);
  if(mine){
    await sb.from('devices').update({last_seen:new Date().toISOString()}).eq('id', mine.id);
    return;
  }
  const limit = S.profile.device_limit||1;
  if((devices||[]).length >= limit){
    S.deviceBlocked = true;
    return;
  }
  await sb.from('devices').insert({user_id:S.profile.id, device_id:S.deviceId});
}

// ---------- render dispatcher ----------
function render(){
  if(!S.session){ return renderAuth(); }
  if(S.deviceBlocked){
    app.innerHTML = `<div class="container"><div class="card"><h2>Device limit reached</h2>
      <p class="muted">This account is already signed in on the maximum number of allowed devices. Ask your admin to increase your device limit, or sign out of another device.</p>
      <button class="ghost" id="so">Sign out</button></div></div>`;
    document.getElementById('so').onclick = signOut;
    return;
  }
  // Respect S.view here: an admin who has switched into "Practice (user
  // view)" should keep seeing the user-side screens as navigation happens
  // (e.g. via goTo/back), not get bounced back to the admin panel just
  // because their account role is admin.
  if(S.profile?.role==='admin' && S.view!=='user') return renderAdmin();
  return renderUser();
}

function topbar(title, right=''){
  const isLight = document.documentElement.classList.contains('light');
  return `<div class="topbar"><div class="brand"><span class="dot"></span>${title}</div><div class="row">${right}<button class="themebtn" id="themeBtn" title="Toggle dark/light">${isLight?'🌙':'☀️'}</button><button class="ghost" id="signoutBtn" style="padding:8px 12px;font-size:13px;">Sign out</button></div></div>`;
}
function bindTopbar(){
  const b=document.getElementById('signoutBtn'); if(b) b.onclick=signOut;
  const tb=document.getElementById('themeBtn'); if(tb) tb.onclick=toggleTheme;
}
async function signOut(){ await sb.auth.signOut(); S.profile=null; S.deviceBlocked=false; render(); }

      </div>
      <label>Email</label><input id="email" type="email" placeholder="you@example.com">
      <label>Password</label><input id="pass" type="password" placeholder="••••••••">
      <div id="authErr" class="muted" style="color:var(--red);margin-top:8px;"></div>
      <button class="primary" id="authGo" style="width:100%;margin-top:16px;">${S.authMode==='login'?'Login':'Create account'}</button>
    </div>
  </div>`;

    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('pass').value;
    const errEl=document.getElementById('authErr'); errEl.textContent='';
    if(!email||!password){ errEl.textContent='Enter email and password.'; return; }

      const { error } = await sb.auth.signUp({ email, password });

    S.session=session; await loadProfile(); render();
  };
}

// ---- QBank -> Folder -> Sets navigation ----
function crumbBar(items){
  // items: [{label, onClick}]
  return `<div class="crumbs">` + items.map((it,i)=>{
    const sep = i>0 ? ' / ' : '';
    return sep + (it.onClick ? `<span data-crumb="${i}">${it.label}</span>` : it.label);
  }).join('') + `</div>`;
}
async function loadQbanksNav(isActive){
  if(!S.nav.qbankId){ return loadQbankList(isActive); }
  if(!S.nav.folderId){ return loadFolderList(isActive); }
  return loadFolderSets(isActive);
}
async function loadQbankList(isActive){
  const body=document.getElementById('utabBody');
  body.innerHTML = '';
  const { data: qbanks } = await sb.from('qbanks').select('*').order('created_at',{ascending:false});
  if(!qbanks || !qbanks.length){ body.innerHTML += `<div class="card muted">No qbanks published yet.</div>`; return; }
  // Fire all section-count queries in parallel instead of one-by-one —
  // sequential awaits here were the main cause of the slow load.
  const counts = await Promise.all(qbanks.map(qb=>
    sb.from('folders').select('id', {count:'exact', head:true}).eq('qbank_id', qb.id)
  ));
  let html = '<div class="grid">';
  qbanks.forEach((qb,i)=>{
    const count = counts[i].count;
    html += `<div class="card" style="cursor:pointer;" data-qb="${qb.id}"><h3>${qb.name}</h3><div class="muted">${count||0} sections</div></div>`;
  });
  html += '</div>';
  body.innerHTML += html;
  body.querySelectorAll('[data-qb]').forEach(el=>el.onclick=()=>{ goTo({nav:{qbankId: el.dataset.qb}}); });
}
async function loadFolderList(isActive){
  const body=document.getElementById('utabBody');
  body.innerHTML = '';
  const { data: qb } = await sb.from('qbanks').select('*').eq('id', S.nav.qbankId).maybeSingle();
  body.innerHTML += crumbBar([{label:'QBanks', onClick:true},{label:qb?.name||'QBank'}]);
  const { data: folders } = await sb.from('folders').select('*').eq('qbank_id', S.nav.qbankId).order('name');
  // Same fix as the qbank list: run every section's question-count query in
  // parallel rather than awaiting them one at a time, which was what made
  // opening a qbank (e.g. BTR) with many sections feel slow.
  const counts = await Promise.all((folders||[]).map(f=>
    sb.from('questions').select('id', {count:'exact', head:true}).eq('folder_id', f.id)
  ));
  let html = '';
  (folders||[]).forEach((f,i)=>{
    const count = counts[i].count;
    const cfg = EXAM_CONFIG[f.exam_type];
    html += `<div class="qrow" data-folder="${f.id}">
      <div><b>${f.name}</b> · ${count||0} questions</div>
      <span class="badge ${cfg?'active':'unset'}">${cfg?cfg.label:'Not configured'}</span>
    </div>`;
  });
  if(!html) html = `<div class="card muted">No sections in this qbank yet.</div>`;
  document.getElementById('utabBody').innerHTML += html;
  const crumb = document.querySelector('[data-crumb="0"]');
  if(crumb) crumb.onclick = ()=>{ goTo({nav:{}}); };
  document.querySelectorAll('[data-folder]').forEach(el=>{
    el.onclick = async ()=>{
      const fid = el.dataset.folder;
      const { data: f } = await sb.from('folders').select('*').eq('id', fid).maybeSingle();
      if(!f.exam_type){ toast('Admin has not configured this section yet'); return; }
      goTo({nav:{...S.nav, folderId: fid}});
    };
  });
}
async function loadFolderSets(isActive){
  const body=document.getElementById('utabBody');
  body.innerHTML = '';
  const { data: qb } = await sb.from('qbanks').select('*').eq('id', S.nav.qbankId).maybeSingle();
  const { data: folder } = await sb.from('folders').select('*').eq('id', S.nav.folderId).maybeSingle();
  body.innerHTML += crumbBar([{label:'QBanks', onClick:true},{label:qb?.name||'QBank', onClick:true},{label:folder?.name||'Section'}]);
  document.querySelector('[data-crumb="0"]').onclick = ()=>{ goTo({nav:{}}); };
  document.querySelector('[data-crumb="1"]').onclick = ()=>{ goTo({nav:{qbankId:S.nav.qbankId}}); };

  const { data: sets } = await sb.from('sets').select('*').eq('folder_id', folder.id).is('user_id', null).order('subject').order('set_number');
  let html = '';
  if(!sets || !sets.length){ html = `<div class="card muted">No sets generated for this section yet.</div>`; }
  else if(folder.exam_type==='subjectwise'){
    const bySubject={};
    sets.forEach(s=>{ (bySubject[s.subject||'General']=bySubject[s.subject||'General']||[]).push(s); });
    for(const subj in bySubject){
      html += `<div class="muted" style="margin:10px 0 4px;font-weight:600;">${subj}</div>`;
      for(const s of bySubject[subj]) html += await setRow(s, isActive);
    }
  } else {
    let allDone = true, anyDone = false;
    for(const s of sets){
      const locked = EXAM_CONFIG[folder.exam_type].sequential && s.set_number>1 ? await isLocked(folder.id, s.set_number) : false;
      html += await setRow(s, isActive, locked);
      const { data: doneAtt } = await sb.from('attempts').select('id').eq('user_id', S.profile.id).eq('set_id', s.id).eq('status','submitted').maybeSingle();
      if(doneAtt) anyDone = true; else allDone = false;
    }
    // Whole-section total: counts every subsection's score/correct/total
    // together in one go (not one set at a time), so you see the overall
    // percentage and where you rank against everyone else on this section,
    // as soon as you've submitted at least one subsection here.
    if(anyDone){
      const { data: fstats, error: fErr } = await sb.rpc('folder_rank_stats', { p_folder_id: folder.id, p_user_id: S.profile.id });
      const frow = Array.isArray(fstats) ? fstats[0] : fstats;
      if(frow && frow.user_total){
        const fpct = Math.round((frow.user_correct/frow.user_total)*1000)/10;
        html += `<div class="card" style="margin-top:14px;">
          <h3>Section total (all ${frow.sets_total} subsections)</h3>
          <div class="muted">✅ ${frow.user_correct}/${frow.user_total} correct (${fpct}%) · score ${frow.user_score>0?'+':''}${frow.user_score} · ${frow.sets_completed}/${frow.sets_total} subsections done</div>
          <div class="muted" style="margin-top:4px;">${frow.rank ? `Rank ${frow.rank}/${frow.total_attempts} · ${frow.percentile}ᵗʰ percentile` : 'Not enough other users\' totals yet to rank against.'}</div>
        </div>`;
      } else if(fErr){
        html += `<div class="card muted" style="margin-top:14px;">Section total isn't available yet — ask admin to run the ranking database update.</div>`;
      }
    }
    if(allDone && sets.length){
      html += `<div class="row" style="margin-top:8px;"><button class="subtle" id="fullTestBtn">📊 Review full test (all sections)</button></div>`;
    }
  }
  document.getElementById('utabBody').innerHTML += html;
  wireSetRows();
  const ftBtn = document.getElementById('fullTestBtn');
  if(ftBtn) ftBtn.onclick = ()=> loadFullTestReview(folder.id);
}
async function isLocked(folderId, setNumber){
  const { data: prevSet } = await sb.from('sets').select('id').eq('folder_id', folderId).is('user_id', null).eq('set_number', setNumber-1).eq('set_type','main').maybeSingle();
  if(!prevSet) return false;
  const { data: att } = await sb.from('attempts').select('status').eq('user_id', S.profile.id).eq('set_id', prevSet.id).eq('status','submitted').maybeSingle();
  return !att;
}
async function setRow(s, isActive, locked=false){
  const n = s.question_ids.length;
  const { data: att } = await sb.from('attempts').select('*').eq('user_id', S.profile.id).eq('set_id', s.id).eq('status','submitted').order('submitted_at',{ascending:false}).limit(1).maybeSingle();
  let statsHtml = '';
  if(att){
    const { data: stats } = await sb.rpc('set_rank_stats', { p_set_id: s.id, p_user_id: S.profile.id });
    const row = Array.isArray(stats) ? stats[0] : stats;
    // Percentage is always computed straight from this attempt's own
    // correct/total — it no longer depends on the rank RPC returning data,
    // so it still shows even when there's only one attempt so far (no one
    // to rank/percentile against yet).
    const totalQ = att.total_questions ?? n;
    const pct = totalQ ? Math.round((att.correct_count||0)/totalQ*1000)/10 : null;
    statsHtml = `<div class="muted" style="font-size:12px;margin-top:3px;">
      ✅ ${att.correct_count ?? '—'}/${totalQ} correct (${pct!=null?pct+'%':'—'}) · score ${att.score>0?'+':''}${att.score}
      ${row && row.rank ? ` · rank ${row.rank}/${row.total_attempts} · ${row.percentile}ᵗʰ percentile` : ' · percentile: not enough attempts yet to compare'}
    </div>`;
  }
  return `<div class="qrow" style="flex-direction:column;align-items:stretch;gap:6px;cursor:default;">
    <div class="row" style="justify-content:space-between;">
      <div><b>Set ${s.set_number}</b> · ${n} questions · ${s.duration_minutes} min ${locked?'<span class="lockicon">🔒</span>':''}</div>
      <div class="row" style="gap:8px;">
        ${att?`<button class="subtle" data-reviewset="${s.id}">Review</button>`:''}
        <button class="${isActive&&!locked?'primary':'ghost'}" data-startset="${s.id}" ${(!isActive||locked)?'disabled':''}>${!isActive?'Locked':locked?'Complete previous':att?'Retake':'Start'}</button>
      </div>
    </div>
    ${statsHtml}
  </div>`;
}
function wireSetRows(){
  document.querySelectorAll('[data-startset]').forEach(b=>{
    b.onclick = ()=> startAttempt(b.dataset.startset);
  });
  document.querySelectorAll('[data-reviewset]').forEach(b=>{
    b.onclick = ()=> openReviewForSet(b.dataset.reviewset);
  });
}
async function openReviewForSet(setId){
  const { data: s } = await sb.from('sets').select('*').eq('id', setId).maybeSingle();
  const { data: att } = await sb.from('attempts').select('*').eq('user_id', S.profile.id).eq('set_id', setId).eq('status','submitted').order('submitted_at',{ascending:false}).limit(1).maybeSingle();
  if(!s || !att){ toast('No completed attempt to review yet'); return; }
  // Same reasoning as startAttempt: skip the (possibly large, embedded-base64)
  // image_url in this bulk fetch so review opens quickly; images are loaded
  // lazily per-question as you page through (see ensureQuestionImage).
  const { data: qs } = await sb.from('questions').select('id, q_text, options, correct_index, explanation, subject').in('id', s.question_ids);
  const questions = s.question_ids.map(id=>qs.find(q=>q.id===id)).filter(Boolean);
  goTo({ review:{ att, set: s, questions, showExpl:false } });
}
async function loadFullTestReview(folderId){
  const { data: sets } = await sb.from('sets').select('*').eq('folder_id', folderId).is('user_id', null).eq('set_type','main').order('set_number');
  let allQuestions = [], mergedAnswers = {}, totalScore = 0, totalCorrect = 0, totalQ = 0;
  for(const s of sets){
    const { data: att } = await sb.from('attempts').select('*').eq('user_id', S.profile.id).eq('set_id', s.id).eq('status','submitted').order('submitted_at',{ascending:false}).limit(1).maybeSingle();
    if(!att){ toast('Complete every section first'); return; }
    const { data: qs } = await sb.from('questions').select('id, q_text, options, correct_index, explanation, subject').in('id', s.question_ids);
    const ordered = s.question_ids.map(id=>qs.find(q=>q.id===id)).filter(Boolean);
    allQuestions = allQuestions.concat(ordered);
    Object.assign(mergedAnswers, att.answers);
    totalScore += (att.score||0); totalCorrect += (att.correct_count||0); totalQ += (att.total_questions||ordered.length);
  }
  const fakeAtt = { id:null, answers: mergedAnswers, score: totalScore, correct_count: totalCorrect, total_questions: totalQ };
  goTo({ review:{ att: fakeAtt, set: {question_ids: allQuestions.map(q=>q.id)}, questions: allQuestions, showExpl:false } });
}

async function loadStatsTab(){
  const body=document.getElementById('utabBody');
  body.innerHTML = '';
  const start = new Date(); start.setHours(0,0,0,0);
  const weekStart = new Date(start); weekStart.setDate(weekStart.getDate()-6);

  // One query covers both "today" and the 7-day daily breakdown, using the
  // correct_count/total_questions already stored on each attempt at submit
  // time — no more per-attempt "look up every question again" loop, which
  // was what made this tab slow to open.
  const [{ data: weekAttempts }, pctRes] = await Promise.all([
    sb.from('attempts').select('correct_count, total_questions, submitted_at')
      .eq('user_id', S.profile.id).eq('status','submitted').gte('submitted_at', weekStart.toISOString()),
    sb.rpc('get_today_percentile'),
  ]);
  const pct = pctRes.data && pctRes.data[0];

  const todayKey = start.toLocaleDateString('en-CA');
  const byDay = {};
  (weekAttempts||[]).forEach(a=>{
    const key = new Date(a.submitted_at).toLocaleDateString('en-CA');
    byDay[key] = byDay[key] || {attempted:0, correct:0};
    byDay[key].attempted += (a.total_questions||0);
    byDay[key].correct += (a.correct_count||0);
  });
  const today = byDay[todayKey] || {attempted:0, correct:0};
  const total = today.attempted, corrCount = today.correct, wrongCount = total - corrCount;

  let percentileHtml;
  if(pct && pct.percentile != null){
    percentileHtml = `<div class="muted" style="margin-top:10px;">You're doing better than <b style="color:var(--text)">${pct.percentile}%</b> of the ${pct.users_compared} user${pct.users_compared===1?'':'s'} active today (your accuracy: ${Math.round(pct.my_accuracy)}%).</div>`;
  } else if(total > 0){
    percentileHtml = `<div class="muted" style="margin-top:10px;">Not enough other users active today yet to compare against.</div>`;
  } else {
    percentileHtml = `<div class="muted" style="margin-top:10px;">Attempt some questions today to see how you compare with others.</div>`;
  }

  const days = Object.keys(byDay).sort().reverse();
  let dailyHtml = `<div class="card"><h3>Daily stats (last 7 days)</h3>`;
  if(days.length){
    dailyHtml += days.map(d=>{
      const {attempted, correct} = byDay[d];
      const acc = attempted ? Math.round(correct/attempted*100) : 0;
      const label = d===todayKey ? 'Today' : new Date(d+'T00:00:00').toLocaleDateString('en-IN', {weekday:'short', day:'numeric', month:'short'});
      return `<div class="qrow" style="cursor:default;"><div><b>${label}</b> · ${attempted} q attempted</div><div class="muted">${correct}/${attempted||1} correct (${acc}%)</div></div>`;
    }).join('');
  } else {
    dailyHtml += `<div class="muted">No attempts in the last 7 days yet — this fills in as you complete sets.</div>`;
  }
  dailyHtml += `</div>`;

  document.getElementById('utabBody').innerHTML += `<div class="card"><h3>Today</h3>
    <div class="row" style="gap:26px;">
      <div><div class="stat-big">${total}</div><div class="muted">Attempted</div></div>
      <div><div class="stat-big" style="color:var(--green)">${corrCount}</div><div class="muted">Correct</div></div>
      <div><div class="stat-big" style="color:var(--red)">${wrongCount}</div><div class="muted">Wrong</div></div>
    </div>
    ${percentileHtml}
  </div>
  ${dailyHtml}`;
}

// ================= EXAM PLAYER =================
async function startAttempt(setId){
  const { data: set } = await sb.from('sets').select('*').eq('id', setId).maybeSingle();
  let { data: att } = await sb.from('attempts').select('*').eq('user_id', S.profile.id).eq('set_id', setId).eq('status','in_progress').maybeSingle();
  // Deliberately excludes image_url: some questions now carry embedded
  // base64 images (can be several hundred KB each), and pulling that for
  // every question in the set up front is what was making a set take so
  // long to open. Text loads instantly; each question's image is fetched
  // lazily (see ensureQuestionImage) only once you're actually viewing it.
  const { data: questions } = await sb.from('questions')
    .select('id, q_text, options, correct_index, explanation, subject')
    .in('id', set.question_ids);
  const ordered = set.question_ids.map(id=>questions.find(q=>q.id===id)).filter(Boolean);
  if(!att){
    const initAnswers={}; ordered.forEach(q=>initAnswers[q.id]={selected:null,status:'not_visited'});
    const ins = await sb.from('attempts').insert({user_id:S.profile.id, set_id:setId, answers:initAnswers}).select().maybeSingle();
    att = ins.data;
  }
  const elapsedSec = Math.floor((Date.now()-new Date(att.started_at).getTime())/1000);
  const totalSec = Math.round(set.duration_minutes*60);
  if(elapsedSec >= totalSec){ await submitAttempt(att, set, ordered, true); return; }
  goTo({ exam:{ set, att, questions:ordered, idx:0, totalSec, elapsedAtLoad:elapsedSec }, view:'exam' });
  startTimer();
}
// Fetches a single question's image_url on demand (undefined = not fetched
// yet, null = fetched and confirmed there isn't one). Calls onLoaded() once
// it arrives so the caller can re-render if the user is still looking at
// this exact question — used from both the exam player and review screens.
function ensureQuestionImage(q, onLoaded){
  if(q.image_url !== undefined || q._imgFetching) return;
  q._imgFetching = true;
  sb.from('questions').select('image_url').eq('id', q.id).maybeSingle().then(({data})=>{
    q.image_url = data ? data.image_url : null;
    q._imgFetching = false;
    if(onLoaded) onLoaded();
  });
}
let timerHandle=null;
function startTimer(){
  clearInterval(timerHandle);
  const t0 = Date.now();
  timerHandle = setInterval(()=>{
    const elapsed = S.exam.elapsedAtLoad + Math.floor((Date.now()-t0)/1000);
    const remain = S.exam.totalSec - elapsed;
    const el = document.getElementById('examTimer');
    if(el) el.textContent = fmtTime(remain);
    const ring = document.getElementById('examTimerRing');
    if(ring){
      const pct = Math.max(0, Math.min(100, (remain/S.exam.totalSec)*100));
      ring.style.setProperty('--pct', pct);
      ring.classList.toggle('low', remain<=300);
    }
    if(remain<=0){ clearInterval(timerHandle); submitAttempt(S.exam.att, S.exam.set, S.exam.questions, true); }
  },1000);
}
function renderExam(){
  const { set, att, questions, idx } = S.exam;
  const q = questions[idx];
  if(att.answers[q.id].status==='not_visited') att.answers[q.id].status='not_answered';
  ensureQuestionImage(q, ()=>{ if(S.exam && S.exam.questions[S.exam.idx] === q) renderExam(); });
  app.innerHTML = `<div class="topbar"><div class="row" style="gap:10px;align-items:center;"><button class="ghost" id="exitExamBtn" style="padding:8px 12px;font-size:12px;min-height:auto;">← Back</button><div class="brand"><span class="dot"></span>Set ${set.set_number||''} ${set.category?('· '+set.category.replace('_',' ')):''}</div></div><span class="timer-ring" id="examTimerRing" style="--pct:${Math.max(0,Math.min(100,(S.exam.totalSec-S.exam.elapsedAtLoad)/S.exam.totalSec*100))}"><span class="timer" id="examTimer">${fmtTime(S.exam.totalSec-S.exam.elapsedAtLoad)}</span></span></div>
  <div class="exam-shell">
    <div class="exam-main">
      <div class="qmeta">Question ${idx+1} of ${questions.length}</div>
      <div style="font-weight:600;font-size:18.5px;line-height:1.55;">${q.image_url===undefined && q._imgFetching ? '<div class="muted" style="font-size:12px;margin-bottom:8px;">Loading image…</div>' : ''}${richBlock(q.q_text, q.image_url)}</div>
      <div id="opts"></div>
      <div class="row" style="margin-top:16px;">
        <button class="subtle" id="prevQ" ${idx===0?'disabled':''}>◀ Prev</button>
        <button class="ghost" id="clearQ">Clear response</button>
        <button class="subtle" id="markQ">${['marked','answered_marked'].includes(att.answers[q.id].status)?'Unmark review':'Mark for review'}</button>
        <button class="primary" id="nextQ" ${idx===questions.length-1?'disabled':''}>Save & Next ▶</button>
      </div>
      <div class="divider"></div>
      <button class="danger" id="submitSet">Submit set</button>
    </div>
    <div class="exam-side">
      <div class="muted" style="font-size:12px;">Question palette</div>
      <div class="palette" id="palette"></div>
      <div class="legend">
        <div><span style="background:var(--gray)"></span>Not visited</div>
        <div><span style="background:var(--red)"></span>Not answered</div>
        <div><span style="background:var(--green)"></span>Answered</div>
        <div><span style="background:var(--purple)"></span>Marked for review</div>
        <div><span style="background:var(--purple);box-shadow:inset 0 0 0 2px var(--green)"></span>Answered & marked</div>
      </div>
    </div>
  </div>`;
  renderOpts(); renderPalette();
  document.getElementById('prevQ').onclick=()=>{ saveAttemptSoft(); S.exam.idx--; renderExam(); };
  document.getElementById('nextQ').onclick=()=>{ saveAttemptSoft(); S.exam.idx++; renderExam(); };
  document.getElementById('clearQ').onclick=()=>{ const a=att.answers[q.id]; a.selected=null; a.status = a.status==='answered_marked'?'marked':'not_answered'; saveAttemptSoft(); renderExam(); };
  document.getElementById('markQ').onclick=()=>{ const a=att.answers[q.id]; if(['marked','answered_marked'].includes(a.status)){ a.status = a.selected!=null?'answered':'not_answered'; } else { a.status = a.selected!=null?'answered_marked':'marked'; } saveAttemptSoft(); renderExam(); };
  document.getElementById('submitSet').onclick=()=>{
    if(confirm('Submit this set now? You cannot resume it after submission.')) submitAttempt(att,set,questions,false);
  };
  document.getElementById('exitExamBtn').onclick=()=>{
    saveAttemptSoft();
    // Go through the same path as the phone's back button/gesture, so both
    // land on exactly the same previous screen (the set list) instead of
    // resetting navigation.
    history.back();
  };
}
function renderOpts(){
  const { att, questions, idx } = S.exam;
  const q=questions[idx]; const a=att.answers[q.id];
  const el=document.getElementById('opts');
  el.innerHTML = q.options.map((o,i)=>`<div class="opt ${a.selected===i?'sel':''}" data-i="${i}">${renderRichText(o)}</div>`).join('');

function renderPalette(){
  const { att, questions, idx } = S.exam;

  document.querySelectorAll('.pnum').forEach(p=>p.onclick=()=>{ saveAttemptSoft(); S.exam.idx=+p.dataset.i; renderExam(); });

let saveTimeout=null;
function saveAttemptSoft(){
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(async ()=>{
    await sb.from('attempts').update({answers:S.exam.att.answers}).eq('id', S.exam.att.id);
  }, 400);
}
async function submitAttempt(att, set, questions, auto){
  clearInterval(timerHandle);
  const { data: qs } = await sb.from('questions').select('id, correct_index').in('id', set.question_ids);
  let score=0, correctCount=0;
  for(const q of qs){
    const a=att.answers[q.id];
    if(a && (a.status==='answered'||a.status==='answered_marked')){
      if(a.selected===q.correct_index){ score+=4; correctCount++; } else { score-=1; }
    }
  }
  await sb.from('attempts').update({answers:att.answers, status:'submitted', submitted_at:new Date().toISOString(), score, correct_count:correctCount, total_questions:qs.length}).eq('id', att.id);
  att.status='submitted'; att.score=score;
  toast(auto? 'Time up — set auto-submitted' : 'Set submitted');
  S.exam = null;
  S.review = { att, set, questions, showExpl:false };
  renderReviewChoice();
}
function renderReviewChoice(){

  document.getElementById('rwith').onclick=()=>renderReview(true,0,document.getElementById('wrongOnlyChk').checked);
  document.getElementById('backHome').onclick=()=>{ history.back(); };

async function renderReview(withExpl, i=0, wrongOnly=false){
  const { att, questions: allQuestions } = S.review;
  const questions = wrongOnly
    ? allQuestions.filter(q=>{ const a=att.answers[q.id]; return a && a.selected!=null && a.selected!==q.correct_index; })
    : allQuestions;
  if(!questions.length){
    app.innerHTML = `<div class="container" style="max-width:480px;padding-top:14vh;text-align:center;">
      <div class="card"><h2>No wrong answers 🎉</h2><p class="muted">Every attempted question in this set was correct.</p>
      <button class="ghost" id="backHome2">Back to dashboard</button></div></div>`;
    document.getElementById('backHome2').onclick=()=>{ history.back(); };
    return;
  }
  i = Math.max(0, Math.min(i, questions.length-1));
  const q = questions[i]; const a = att.answers[q.id];
  ensureQuestionImage(q, ()=>{ if(S.review && S.review.questions[S.review.questions.indexOf(q)]===q) renderReview(withExpl, i, wrongOnly); });
  const { data: existingCat } = await sb.from('categorizations').select('category').eq('user_id', S.profile.id).eq('question_id', q.id).maybeSingle();
  app.innerHTML = `<div class="topbar"><div class="brand"><span class="dot"></span>Review ${i+1}/${questions.length} ${wrongOnly?'· wrong only':''}</div><button class="ghost" id="closeRev" style="padding:8px 12px;font-size:12px;">Close</button></div>
  <div class="container">
    <div class="reviewcard" id="revCapture">
      <div class="qmeta">Question ${i+1}</div>
      <div style="font-weight:600;font-size:18.5px;line-height:1.55;">${q.image_url===undefined && q._imgFetching ? '<div class="muted" style="font-size:12px;margin-bottom:8px;">Loading image…</div>' : ''}${richBlock(q.q_text, q.image_url)}</div>
      <div id="revOpts"></div>
      ${withExpl?`<div class="divider"></div><div><b>Explanation</b>${renderRichText(q.explanation||'No explanation provided.')}</div>`:''}
    </div>
    ${withExpl?`<div class="row"><button class="subtle" id="ssWith">📸 Save screenshot (with explanation)</button><button class="subtle" id="ssWithout">📸 Save screenshot (without explanation)</button></div>`
      :`<div class="card"><div class="muted" style="margin-bottom:6px;">Why did this go wrong?</div><div class="catbtns" id="catbtns"></div></div>`}
    <div class="row" style="margin-top:14px;"><button class="ghost" id="pv" ${i===0?'disabled':''}>◀ Prev</button><button class="primary" id="nx" ${i===questions.length-1?'disabled':''}>Next ▶</button></div>
  </div>`;
  const optsEl=document.getElementById('revOpts');
  optsEl.innerHTML = q.options.map((o,idx)=>{
    let cls='';
    if(idx===q.correct_index) cls='correct';
    else if(a.selected===idx) cls='wrong';
    return `<div class="opt ${cls}">${renderRichText(o)}</div>`;
  }).join('');
  document.getElementById('closeRev').onclick=()=>{ history.back(); };
  document.getElementById('pv').onclick=()=>renderReview(withExpl, i-1, wrongOnly);
  document.getElementById('nx').onclick=()=>renderReview(withExpl, i+1, wrongOnly);
  if(!withExpl){
    const cb=document.getElementById('catbtns');
    cb.innerHTML = CATS.map(c=>`<button class="${existingCat?.category===c.key?'primary':'subtle'}" data-c="${c.key}">${c.label}</button>`).join('');
    cb.querySelectorAll('button').forEach(b=>b.onclick=async ()=>{
      await sb.from('categorizations').upsert({user_id:S.profile.id, question_id:q.id, category:b.dataset.c}, {onConflict:'user_id,question_id'});
      toast('Tagged: '+b.textContent);
      renderReview(withExpl,i,wrongOnly);
    });
  } else {
    document.getElementById('ssWith').onclick=()=>captureShot(true);
    document.getElementById('ssWithout').onclick=()=>captureShot(false);
  }
}
async function captureShot(withExpl){
  const node=document.getElementById('revCapture');
  const explDiv = node.querySelector('.divider')?.nextElementSibling;
  const dividerEl = node.querySelector('.divider');
  let hid=false;
  if(!withExpl && dividerEl){ dividerEl.style.display='none'; if(explDiv) explDiv.style.display='none'; hid=true; }
  let canvas;
  try{
    canvas = await html2canvas(node, {backgroundColor:'#141B2E', useCORS:true, imageTimeout:15000});
  }catch(err){
    // Cross-origin question images without permissive CORS headers can
    // "taint" the canvas and make html2canvas throw when it tries to read
    // pixel data back out. Fall back to a version without useCORS so the
    // rest of the screenshot (text, options) still gets saved rather than
    // failing completely.
    try{
      canvas = await html2canvas(node, {backgroundColor:'#141B2E'});
      toast('Saved, but the image couldn\'t be captured (host doesn\'t allow it)');
    }catch(err2){
      if(hid){ dividerEl.style.display=''; if(explDiv) explDiv.style.display=''; }
      toast('Screenshot failed — try again');
      return;
    }
  }
  if(hid){ dividerEl.style.display=''; if(explDiv) explDiv.style.display=''; }
  const link=document.createElement('a');
  link.download = 'question_'+Date.now()+'.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  toast('Image saved to downloads');
}

function prettifyName(filename){
  let n = filename.replace(/\.(ndjson|json|txt)$/i,'');
  n = n.replace(/[_-]+/g,' ').trim();
  return n.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
}

async function adminUpload(){
  const body=document.getElementById('atabBody');
  const { data: qbanks } = await sb.from('qbanks').select('*').order('created_at',{ascending:false});
  body.innerHTML = `<div class="card">
    <h3>Upload questions</h3>
    <label>QBank</label>
    <select id="qbSelect">
      <option value="__new__">+ Create new qbank</option>
      ${(qbanks||[]).map(qb=>`<option value="${qb.id}">${qb.name}</option>`).join('')}
    </select>
    <div id="newQbWrap" style="margin-top:8px;">
      <label>New qbank name</label><input id="newQbName" placeholder="e.g. BTR Collection">
    </div>
    <label>Files (.json / .ndjson) — select multiple</label>
    <input id="qbFiles" type="file" accept=".json,.ndjson,.txt" multiple>
    <label>Images (optional) — select every image file your JSON refers to by filename</label>
    <input id="qbImages" type="file" accept="image/*" multiple>
    <button class="primary" id="qbUpload" style="margin-top:14px;">Parse & upload</button>
    <div id="upStatus" class="muted" style="margin-top:10px; white-space:pre-line;"></div>
  </div>
  <div class="card"><h3>Telegram payments</h3><p class="muted">Payment screenshots are sent to the bot below; open it to view them and then activate the matching user under the Users tab.</p><a href="${TELEGRAM_BOT}"><button class="primary">Open @Missionneetpg_bot</button></a></div>`;

  const qbSel = document.getElementById('qbSelect');
  const newWrap = document.getElementById('newQbWrap');
  const syncNewWrap = ()=>{ newWrap.style.display = qbSel.value==='__new__' ? 'block' : 'none'; };
  syncNewWrap();
  qbSel.onchange = syncNewWrap;

  document.getElementById('qbUpload').onclick = async ()=>{
    const st=document.getElementById('upStatus');
    const files = [...document.getElementById('qbFiles').files];
    if(!files.length){ st.textContent='Choose at least one file.'; return; }

    let explicitQbankId = null;
    if(qbSel.value==='__new__'){
      const name = document.getElementById('newQbName').value.trim();
      if(name){
        const { data: qb, error } = await sb.from('qbanks').insert({name}).select().maybeSingle();
        if(error){ st.textContent='Error creating qbank: '+error.message; return; }
        explicitQbankId = qb.id;
      }
      // else: leave null — each file below will auto-detect its platform
      // (BTR / Prepladder / ...) from its own filename and route itself,
      // reusing an existing qbank of that name instead of duplicating it.
    } else {
      explicitQbankId = qbSel.value;
    }

    // Upload any picked image files to Supabase Storage first, and build a
    // {lowercased original filename -> public URL} map. Questions below
    // reference images purely by filename, so this runs once up front and
    // the map is reused for every question file in this batch.
    let imageMap = {};
    const imageFiles = [...(document.getElementById('qbImages').files||[])];
    let log = [];
    if(imageFiles.length){
      st.textContent = `Uploading ${imageFiles.length} image(s)…`;
      for(const img of imageFiles){
        const safeName = img.name.replace(/[^a-zA-Z0-9._-]/g,'_');
        const path = `q-images/${Date.now()}_${Math.random().toString(36).slice(2,8)}_${safeName}`;
        const { error: upErr } = await sb.storage.from('question-images').upload(path, img, {upsert:false, contentType: img.type||undefined});
        if(upErr){ log.push(`Image "${img.name}": upload failed — ${upErr.message}. (Make sure a public storage bucket named "question-images" exists in Supabase.)`); continue; }
        const { data: pub } = sb.storage.from('question-images').getPublicUrl(path);
        imageMap[img.name.trim().toLowerCase()] = pub.publicUrl;
      }
      log.push(`Images uploaded: ${Object.keys(imageMap).length}/${imageFiles.length}.`);
      st.textContent = log.join('\n');
    }
    for(const file of files){
      st.textContent = log.join('\n') + `\nReading ${file.name}…`;
      try{
        const text = await file.text();
        let rows=[];
        try{ const parsed=JSON.parse(text); rows = Array.isArray(parsed)?parsed:[parsed]; }
        catch(e){ rows = text.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{ try{return JSON.parse(l);}catch(_){return null;} }).filter(Boolean); }
        if(!rows.length){ log.push(`${file.name}: could not parse any questions — skipped.`); st.textContent = log.join('\n'); continue; }

        // Resolve which qbank ("platform") this file belongs to.
        let qbankId = explicitQbankId;
        let qbankLabel = '';
        if(!qbankId){
          const platform = detectPlatformName(rows[0].platform || file.name);
          if(!platform){
            log.push(`${file.name}: no qbank selected/named, and couldn't auto-detect a platform (BTR/Prepladder) from the filename — skipped. Either pick an existing qbank, type a new qbank name, or include the platform name in the filename.`);
            st.textContent = log.join('\n'); continue;
          }
          const { data: existingQb } = await sb.from('qbanks').select('*').ilike('name', platform).maybeSingle();
          if(existingQb){ qbankId = existingQb.id; qbankLabel = existingQb.name; }
          else {
            const { data: newQb, error } = await sb.from('qbanks').insert({name:platform}).select().maybeSingle();
            if(error){ log.push(`${file.name}: error creating qbank "${platform}" — ${error.message}`); st.textContent = log.join('\n'); continue; }
            qbankId = newQb.id; qbankLabel = newQb.name;
          }
        }

        const folderName = rows[0].folder || prettifyName(file.name);
        // Auto-detect pattern from the file/section name: one of the 19 NEET PG
        // subjects (any short/full form) -> subjectwise; anything else
        // (gt1, gt2, neetpg, inicet, ...) -> auto_subsection.
        // A file can explicitly declare its own pattern via an "exam_type"
        // field on its first row (e.g. "topicwise") — this always wins over
        // name-based guessing. Falls back to the old auto-detection for
        // files that don't set it, so nothing already uploaded is affected.
        const explicitType = rows[0].exam_type && EXAM_CONFIG[rows[0].exam_type] ? rows[0].exam_type : null;
        const detection = explicitType
          ? { type: explicitType, subject: rows[0].subject || null }
          : autoDetectExamType(rows[0].folder || file.name);
        let { data: folder } = await sb.from('folders').select('*').eq('qbank_id', qbankId).eq('name', folderName).maybeSingle();
        if(!folder){
          const ins = await sb.from('folders').insert({qbank_id:qbankId, name:folderName, exam_type:detection.type}).select().maybeSingle();
          if(ins.error || !ins.data){ log.push(`${file.name}: couldn't create section "${folderName}" — ${ins.error?.message || 'unknown error'}`); st.textContent = log.join('\n'); continue; }
          folder = ins.data;
        }
        const { count: existingCount } = await sb.from('questions').select('id', {count:'exact', head:true}).eq('folder_id', folder.id);
        const payload = rows.map((r,i)=>({
          qbank_id: qbankId,
          folder_id: folder.id,
          q_text: resolveInlineImages(r.question||r.q_text||r.q||'', imageMap),
          options: (r.options||r.opts||[]).map(o=>resolveInlineImages(o, imageMap)),
          correct_index: typeof r.answer==='number'?r.answer: typeof r.correct_index==='number'?r.correct_index: letterToIndex(r.answer||r.correct),
          explanation: resolveInlineImages(r.explanation||r.expl||'', imageMap),
          image_url: resolveImageField(r.image_url||r.image||null, imageMap),
          subject: r.subject || detection.subject || folderName,
          order_index: (existingCount||0) + i,
        })).filter(q=>q.q_text && q.options?.length);

        // Insert in chunks so one giant request can't stall silently and
        // progress shows up as it goes, instead of one all-or-nothing insert.
        const CHUNK = 200;
        let inserted = 0, chunkErr = null;
        for(let start=0; start<payload.length; start+=CHUNK){
          const chunk = payload.slice(start, start+CHUNK);
          const { error: insErr } = await sb.from('questions').insert(chunk);
          if(insErr){ chunkErr = insErr; break; }
          inserted += chunk.length;
          st.textContent = log.join('\n') + `\n${file.name}: ${inserted}/${payload.length} questions uploaded…`;
        }
        if(chunkErr){ log.push(`${file.name}: upload error after ${inserted}/${payload.length} questions — ${chunkErr.message}`); st.textContent = log.join('\n'); continue; }

        const patternLabel = EXAM_CONFIG[folder.exam_type]?.label || detection.type;
        log.push(`${file.name} → ${qbankLabel?`qbank "${qbankLabel}" / `:''}section "${folderName}": ${inserted} questions added. Pattern: ${patternLabel}${detection.subject?` (subject: ${detection.subject})`:''}.`);
        st.textContent = log.join('\n');

        // Auto-generate sets right away. If the folder already existed from
        // an earlier upload, its exam_type could be stale (e.g. created
        // before this file started declaring "exam_type" explicitly, or
        // uploaded once under a different pattern). When the file makes an
        // explicit pattern declaration that disagrees with what's stored,
        // treat that as authoritative, update it, and regenerate — this is
        // what stops "half the sections are 50q/45min, half are topic-wise"
        // from happening on a re-upload. If no explicit pattern is declared
        // we keep the old hands-off behaviour (only set on first creation,
        // never silently overwritten).
        const patternIsStale = explicitType && folder.exam_type !== explicitType;
        if(!folder.exam_type || patternIsStale){
          await sb.from('folders').update({exam_type:detection.type}).eq('id', folder.id);
          folder.exam_type = detection.type;
        }
        const { count: existingSetCount } = await sb.from('sets').select('id', {count:'exact', head:true}).eq('folder_id', folder.id).is('user_id', null);
        if(!existingSetCount || patternIsStale){
          const n = await generateSetsForFolder(folder);
          log.push(patternIsStale ? `   ↳ pattern updated to "${EXAM_CONFIG[folder.exam_type]?.label||folder.exam_type}" and regenerated: ${n} set(s).` : `   ↳ auto-split into ${n} set(s).`);
          st.textContent = log.join('\n');
        } else {
          log.push(`   ↳ section already has sets — go to "Sections" tab and re-generate if you want these new questions included.`);
          st.textContent = log.join('\n');
        }
      }catch(err){
        // Catches anything unexpected (network drop, a null reference, etc.)
        // so a single bad file can never silently freeze the whole upload —
        // it gets logged and the loop moves on to the next file.
        log.push(`${file.name}: unexpected error — ${err?.message || err}. Skipped, continuing with next file.`);
        st.textContent = log.join('\n');
      }
    }
    log.push('\nAll done. Subject-named files auto-split into 50 q / 45 min sets. Any other name (gt1, gt2, neetpg, inicet, etc.) auto-splits into 50 q / 45 min sequential subsections. You can still override a section\'s pattern from the "Sections" tab.');
    st.textContent = log.join('\n');
    document.getElementById('qbFiles').value='';
    document.getElementById('qbImages').value='';
  };
}
function letterToIndex(v){
  if(v==null) return 0;
  if(typeof v==='number') return v;
  const m={A:0,B:1,C:2,D:3}; return m[String(v).trim().toUpperCase()] ?? 0;
}

function chunkToSets(ids, perSet, fullMinutes, subject){
  // perSet:null means "topic-wise" — never split, one set holds every
  // question in the folder, duration is always 0.9 min/question.
  if(perSet == null){
    if(!ids.length) return [];
    const duration = Math.round(ids.length*0.9*10)/10;
    return [{set_number:1, set_type:'main', subject, question_ids:ids, duration_minutes:duration}];
  }
  const out=[]; let setNum=1;
  for(let i=0;i<ids.length;i+=perSet){
    const chunk = ids.slice(i, i+perSet);
    const duration = chunk.length===perSet ? fullMinutes : Math.round(chunk.length*0.9*10)/10;
    out.push({set_number:setNum++, set_type:'main', subject, question_ids:chunk, duration_minutes:duration});
  }
  return out;
}
// Shared by the manual "Generate sets" button (Sections tab) and by the
// auto-generation that runs right after upload. Wipes existing shared
// (user_id is null) sets for the folder and rebuilds them from whatever
// exam_type is currently set on the folder.
async function generateSetsForFolder(folder){
  const type = folder.exam_type;
  if(!type || !EXAM_CONFIG[type]) return 0;
  const cfg = EXAM_CONFIG[type];
  await sb.from('sets').delete().eq('folder_id', folder.id).is('user_id', null);
  const { data: qs } = await sb.from('questions').select('id, subject').eq('folder_id', folder.id).order('order_index');
  let setsToInsert = [];
  if(type==='subjectwise'){
    const bySubject={};
    (qs||[]).forEach(q=>{ (bySubject[q.subject||folder.name]=bySubject[q.subject||folder.name]||[]).push(q.id); });
    for(const subj in bySubject){
      setsToInsert = setsToInsert.concat(chunkToSets(bySubject[subj], cfg.perSet, cfg.minutesPerFull, subj));
    }
  } else {
    setsToInsert = chunkToSets((qs||[]).map(q=>q.id), cfg.perSet, cfg.minutesPerFull, null);
  }
  if(setsToInsert.length){
    await sb.from('sets').insert(setsToInsert.map(s=>({...s, qbank_id:folder.qbank_id, folder_id:folder.id})));
  }
  return setsToInsert.length;
}
